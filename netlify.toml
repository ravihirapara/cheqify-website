[build]
  command = "npm run build"
  publish = ".next"

# Explicit plugin declaration so Netlify always installs @netlify/plugin-nextjs,
# rather than relying on framework auto-detection. Without this, the plugin
# fails to install on fresh accounts and dynamic Next.js routes return 404.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Note: the / → /en internal rewrite is handled by Next.js (next.config.ts
# rewrites). Doing it here at the Netlify edge does not work because the
# @netlify/plugin-nextjs handler intercepts / before edge redirects apply,
# even with force=true.

[[redirects]]
  from = "/:locale/blog/bulk-cheque-printing-batch-guide-india-cheqify"
  to = "/:locale/blog/bulk-cheque-printing-batch-guide-india"
  status = 301

# /register on the marketing domain doesn't exist — the real signup page
# is on the webapp subdomain. Bing flagged the 404 as "thin content"
# (2026-05-14). Send anyone who lands here to the actual signup page.
[[redirects]]
  from = "/register"
  to = "https://app.cheqify.app/register"
  status = 301

[[redirects]]
  from = "/:locale/register"
  to = "https://app.cheqify.app/register"
  status = 301

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Non-HTML assets must not appear in Google's index. Returning X-Robots-Tag:
# noindex stops them from showing up as "Crawled - currently not indexed" in GSC.
[[headers]]
  for = "/manifest.json"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/favicon-*.png"
  [headers.values]
    X-Robots-Tag = "noindex"

[[headers]]
  for = "/apple-touch-icon*.png"
  [headers.values]
    X-Robots-Tag = "noindex"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://embed.tawk.to https://us.i.posthog.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://cdn.sanity.io https://www.google-analytics.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://us.i.posthog.com https://embed.tawk.to https://cdn.sanity.io https://*.tawk.to wss://*.tawk.to; frame-src https://embed.tawk.to https://www.youtube.com; object-src 'none'; base-uri 'self'"
